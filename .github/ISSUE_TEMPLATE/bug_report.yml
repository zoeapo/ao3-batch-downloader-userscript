name: Bug 报告
description: 报告可以稳定复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: 脚本版本
      placeholder: 0.3.0
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome 版本
    validations:
      required: true
  - type: input
    id: tampermonkey
    attributes:
      label: Tampermonkey 版本
    validations:
      required: true
  - type: dropdown
    id: directory
    attributes:
      label: 是否使用所选文件夹模式
      options:
        - 是
        - 否
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果和面板日志
    validations:
      required: true
